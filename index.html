<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SS1 Bike Rentals</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),url("21428.jpg") center/cover fixed;
color:white;
}

.page{display:none;padding:20px}
.active{display:block}

.navBtn{
padding:10px 20px;
margin:5px;
background:#FFD700;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
background:white;
color:black;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

#dvmBrand{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
font-size:26px;
font-weight:bold;
background:linear-gradient(90deg,red,orange,yellow,green,blue,indigo,violet);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
}

.modalBox{
background:white;
color:black;
width:90%;
max-width:420px;
margin:100px auto;
padding:20px;
border-radius:10px;
text-align:center;
}

.alert{
background:red;
padding:10px;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="homePage" class="page active">

<div style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column">

<h1>SS1 BIKE RENTALS</h1>

<button onclick="showPage('dashboardPage')" class="navBtn">
ENTER WEBSITE
</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboardPage" class="page">

<h2>Bike Dashboard</h2>

<input id="searchRC" placeholder="Search RC" onkeyup="searchBike()">

<table id="bikeTable"></table>

<button onclick="showPage('bookingPage')" class="navBtn">
Booking →
</button>

</div>

<!-- BOOKING -->

<div id="bookingPage" class="page">

<h2>Booking</h2>

<input id="bkName" placeholder="Customer Name">

<input id="bkPhone" placeholder="Phone" onkeyup="checkHistory()">

<input id="bkAadhaar" placeholder="Aadhaar" onkeyup="checkBlacklist()">

<input id="bkDL" placeholder="Driving Licence Number">

<select id="bkBike">

<option>Suzuki Access</option>
<option>Honda Activa</option>
<option>Yamaha Fascino</option>
<option>TVS Jupiter</option>
<option>Bajaj Pulsar</option>
<option>Honda Shine</option>

</select>

<button onclick="addBooking()" class="navBtn">Book</button>

<div id="historyBox"></div>

<div id="blacklistAlert"></div>

<table id="bookingTable">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Aadhaar</th>
<th>DL</th>
<th>Bike</th>
<th>Rent</th>
<th>Start</th>
<th>End</th>
<th>Total</th>
<th>Invoice</th>
</tr>

</table>

<button onclick="showPage('dashboardPage')" class="navBtn">← Dashboard</button>

</div>

<!-- PROFILE -->

<div id="profileModal" class="modal">

<div class="modalBox">

<h2>DVM Chowdary</h2>

<img src="7506.jpg" width="120" style="border-radius:50%">

<p>Name : D. Manikanta</p>

<p>Website Developer & Tester</p>

<p>📞 8333033390<br>📞 8333996066</p>

<p>📧 dondapatimanikanta@yahoo.com</p>

<p>Live Young Live Free</p>

<button onclick="closeProfile()">Close</button>

</div>

</div>

<div id="dvmBrand" onclick="openProfile()">
DVM Chowdary
</div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

/* navigation */

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"))
document.getElementById(p).classList.add("active")
}

/* invoice serial */

let invoiceCounter=localStorage.getItem("invoiceCounter")
if(!invoiceCounter){invoiceCounter=1}else{invoiceCounter=parseInt(invoiceCounter)}

/* bike models */

const models=[
{name:"Suzuki Access",price:500},
{name:"Honda Activa",price:500},
{name:"Yamaha Fascino",price:500},
{name:"TVS Jupiter",price:500},
{name:"Bajaj Pulsar",price:700},
{name:"Honda Shine",price:700}
]

let bikes=[]
let history=[]
let blacklist=[]

for(let i=1;i<=50;i++){
let m=models[(i-1)%models.length]
bikes.push({
id:i,
name:m.name,
price:m.price,
rc:"AP39SS"+(1000+i),
status:"Available"
})
}

/* dashboard */

function loadDashboard(){

let table=bikeTable

table.innerHTML=

`<tr>
<th>ID</th>
<th>Model</th>
<th>RC</th>
<th>Price</th>
<th>Status</th>
<th>Timer</th>
<th>Action</th>
</tr>`

bikes.forEach(b=>{

let timer=""

if(b.status==="OUT" && b.start){

let diff=(new Date()-b.start)/1000
let remain=86400-diff

if(remain>0){
let h=Math.floor(remain/3600)
let m=Math.floor((remain%3600)/60)
timer=h+"h "+m+"m"
}else{
timer="OVERDUE"
document.getElementById("alarm").play()
}

}

table.innerHTML+=`

<tr>

<td>${b.id}</td>

<td>${b.name}</td>

<td>
<input value="${b.rc}" id="rc${b.id}" style="width:100px">
<button onclick="saveRC(${b.id})">Save</button>
</td>

<td>₹${b.price}</td>

<td>${b.status}</td>

<td>${timer}</td>

<td>
<button onclick="bikeOut(${b.id})">OUT</button>
<button onclick="bikeIn(${b.id})">IN</button>
</td>

</tr>

`

})

}

loadDashboard()
setInterval(loadDashboard,1000)

/* rc edit */

function saveRC(id){
let bike=bikes.find(b=>b.id===id)
bike.rc=document.getElementById("rc"+id).value
}

/* search */

function searchBike(){
let v=searchRC.value.toLowerCase()
document.querySelectorAll("#bikeTable tr").forEach(r=>{
if(!r.innerText.toLowerCase().includes(v)) r.style.display="none"
})
}

/* bike out */

function bikeOut(id){
let bike=bikes.find(b=>b.id===id)
bike.start=new Date()
bike.status="OUT"
}

/* bike in */

function bikeIn(id){
let bike=bikes.find(b=>b.id===id)
bike.status="Available"
}

/* booking */

function addBooking(){

let name=bkName.value
let phone=bkPhone.value
let aadhaar=bkAadhaar.value
let dl=bkDL.value
let bike=bkBike.value

let price=(bike==="Bajaj Pulsar"||bike==="Honda Shine")?700:500

let start=new Date()

history.push({phone,bike,date:start})

let r=bookingTable.insertRow()

r.insertCell(0).innerText=name
r.insertCell(1).innerText=phone
r.insertCell(2).innerText=aadhaar
r.insertCell(3).innerText=dl
r.insertCell(4).innerText=bike
r.insertCell(5).innerText="₹"+price
r.insertCell(6).innerText=start.toLocaleString()

r.insertCell(7).innerHTML=
`<button onclick="endRide(this,'${name}','${phone}','${aadhaar}','${dl}','${bike}',${price})">END</button>`

r.insertCell(8).innerText=""
r.insertCell(9).innerText=""

}

/* end ride */

function endRide(btn,name,phone,aadhaar,dl,bike,price){

let row=btn.parentNode.parentNode

let start=new Date(row.cells[6].innerText)
let end=new Date()

row.cells[7].innerText=end.toLocaleString()

let hrs=(end-start)/1000/60/60
let used=Math.ceil(hrs)
let late=Math.max(0,used-24)
let charge=late*50
let total=price+charge

row.cells[8].innerText="₹"+total

row.cells[9].innerHTML=
`<button onclick="generateInvoice('${name}','${phone}','${aadhaar}','${dl}','${bike}',${price},${late},${charge},${total})">
Invoice
</button>`

}

/* invoice */

async function generateInvoice(name,phone,aadhaar,dl,bike,price,late,charge,total){

const { jsPDF } = window.jspdf

let invoice="SSBikes-"+invoiceCounter.toString().padStart(4,'0')
invoiceCounter++
localStorage.setItem("invoiceCounter",invoiceCounter)

let doc=new jsPDF("p","mm","a4")

doc.setFontSize(18)
doc.text("SS1 BIKE RENTALS",70,20)

doc.setFontSize(12)

doc.text("Invoice No : "+invoice,20,40)

doc.text("Customer : "+name,20,55)
doc.text("Phone : "+phone,20,65)
doc.text("Aadhaar : "+aadhaar,20,75)
doc.text("Driving Licence : "+dl,20,85)

doc.text("Bike : "+bike,20,100)

doc.text("Base Rent : ₹"+price,20,115)
doc.text("Late Hours : "+late,20,125)
doc.text("Late Charge : ₹"+charge,20,135)

doc.setFontSize(14)
doc.text("Total Amount : ₹"+total,20,155)

/* terms */

doc.setFontSize(11)

doc.text("Terms & Conditions",20,175)

doc.text("1. Customer must carry Driving License.",20,185)
doc.text("2. Vehicle must be returned in same condition.",20,193)
doc.text("3. Late charge ₹50 per hour after 24 hours.",20,201)
doc.text("4. Traffic challans must be paid by customer.",20,209)
doc.text("5. Damage charges will apply if damage occurs.",20,217)
doc.text("6. Without intimation do not cross city limits.",20,225)
doc.text("7. Do not drink and drive.",20,233)
doc.text("8. Tirumala travel follow TTD 50 minutes rule.",20,241)

/* signatures */

doc.line(20,265,80,265)
doc.text("Customer Signature",20,273)

doc.line(130,265,190,265)
doc.text("SS1 Bike Rentals",135,273)

doc.save(invoice+".pdf")

let msg=
"SS1 BIKE RENTALS\n"+
"Invoice:"+invoice+"\n"+
"Bike:"+bike+"\n"+
"Total:₹"+total

window.open("https://wa.me/91"+phone+"?text="+encodeURIComponent(msg))

}

/* history */

function checkHistory(){
let p=bkPhone.value
historyBox.innerHTML=""
history.forEach(h=>{
if(h.phone===p){
historyBox.innerHTML+="Previous: "+h.bike+" "+h.date+"<br>"
}
})
}

/* blacklist */

function checkBlacklist(){
let a=bkAadhaar.value
blacklist.forEach(b=>{
if(b.aadhaar===a){
blacklistAlert.innerHTML="<div class='alert'>BLACKLIST CUSTOMER</div>"
}
})
}

/* profile */

function openProfile(){
profileModal.style.display="block"
}

function closeProfile(){
profileModal.style.display="none"
}

</script>

</body>
</html>
